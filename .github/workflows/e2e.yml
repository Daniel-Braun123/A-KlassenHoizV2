name: Browser Tests

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-matrix:
    name: browser (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit, mobile-chrome, mobile-safari]
    env:
      PLAYWRIGHT_HTML_OPEN: never
      PLAYWRIGHT_WEB_SERVER_COMMAND: npm run start
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - run: npm install --global npm@11.18.0
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run db:start
      - name: Export local browser-test environment
        shell: pwsh
        run: |
          $status = npx supabase status -o env
          $values = @{}
          foreach ($line in $status) {
            if ($line -match '^(API_URL|PUBLISHABLE_KEY|JWT_SECRET)="([^"]+)"$') {
              $values[$matches[1]] = $matches[2]
            }
          }
          "NEXT_PUBLIC_SUPABASE_URL=$($values.API_URL)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$($values.PUBLISHABLE_KEY)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SUPABASE_TEST_JWT_SECRET=$($values.JWT_SECRET)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "NEXT_PUBLIC_SITE_URL=http://127.0.0.1:3000" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "NEXT_TELEMETRY_DISABLED=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - run: npm run build
      - run: npm run test:e2e -- -Project ${{ matrix.project }}
      - run: npm run test:accessibility -- -Project ${{ matrix.project }}
      - run: npm run test:pwa -- -Project ${{ matrix.project }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 7
      - name: Stop local Supabase
        if: always()
        run: npx supabase stop --no-backup

  browser:
    name: browser
    needs: browser-matrix
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require every browser profile
        env:
          MATRIX_RESULT: ${{ needs.browser-matrix.result }}
        run: test "$MATRIX_RESULT" = "success"
